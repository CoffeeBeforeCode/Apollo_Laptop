-- Conky Column 1 - System Resources & Processes
conky.config = {
    alignment = 'top_right',
    background = true,
    border_width = 1,
    cpu_avg_samples = 2,
    default_color = 'FFFFFF',
    default_outline_color = 'FFFFFF',
    default_shade_color = '1A1A1A',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_newline = false,
    font = 'Inter:size=11',
    gap_x = 20,
    gap_y = 40,
    minimum_height = 5,
    minimum_width = 320,
    maximum_width = 320,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_wayland = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'override',
    own_window_hints = 'undecorated,sticky,below,skip_taskbar,skip_pager',
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    pad_percents = 1,
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 1.0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
    color1 = 'E07B20',
    color2 = '6B6560',
    color3 = '2D6A4F',
    color4 = 'E07B20',
}
conky.text = [[
${font Inter:size=24}${color1}${alignc}${time %H:%M}${font}
${font Inter:size=11}${color2}${alignc}${time %A %d %B %Y}${font}
${hr}
${font Inter:bold:size=11}${color1}System${font} ${color2}${hr 2}
${color2}Hostname:${color}${alignr}${nodename}
${color2}Kernel:${color}${alignr}$kernel
${color2}Uptime:${color}${alignr}$uptime_short
${color2}Board Temp:${color}${alignr}${hwmon pch_cannonlake temp 1}°C
${hr}
${font Inter:bold:size=11}${color1}${execi 3600 lscpu | grep 'Model name' | cut -f 2 -d ":" | awk '{$1=$1}1'}${font} ${color2}${hr 2}
${color2}Temperature:${color}${alignr}${hwmon coretemp temp 1}°C
${color2}Frequency:${color}${alignr}${freq_g} GHz
${color2}Core 1:${color} ${cpu cpu1}% ${color3}${cpubar cpu1}
${color2}Core 2:${color} ${cpu cpu2}% ${color3}${cpubar cpu2}
${color2}Core 3:${color} ${cpu cpu3}% ${color3}${cpubar cpu3}
${color2}Core 4:${color} ${cpu cpu4}% ${color3}${cpubar cpu4}
${hr}
${font Inter:bold:size=11}${color1}${execi 3600 lspci | grep -i 'vga\|3d\|display' | sed 's/.*: //' | sed 's/(.*//' | xargs}${font} ${color2}${hr 2}
${color2}GPU Frequency:${color}${alignr}${exec cat /sys/class/drm/card*/gt_cur_freq_mhz 2>/dev/null | head -1 || echo 'N/A'} MHz
${hr}
${font Inter:bold:size=11}${color1}Memory${font} ${color2}${hr 2}
${color2}RAM:${color} ${alignc}$mem / $memmax${alignr}${color3}$memperc%
${color3}$membar
${color2}Swap:${color} ${alignc}$swap / $swapmax${alignr}${color3}$swapperc%
${color3}$swapbar
${color2}Processes:${color}${alignr}$processes  ${color2}Running:${color} $running_processes
${hr}
${font Inter:bold:size=11}${color1}Top Processes — CPU${font} ${color2}${hr 2}
${color2}Name${goto 165}PID${goto 225}CPU%${goto 275}MEM%
${color}${top name 1}${goto 165}${top pid 1}${goto 225}${top cpu 1}${goto 275}${top mem 1}
${color}${top name 2}${goto 165}${top pid 2}${goto 225}${top cpu 2}${goto 275}${top mem 2}
${color}${top name 3}${goto 165}${top pid 3}${goto 225}${top cpu 3}${goto 275}${top mem 3}
${color}${top name 4}${goto 165}${top pid 4}${goto 225}${top cpu 4}${goto 275}${top mem 4}
${color}${top name 5}${goto 165}${top pid 5}${goto 225}${top cpu 5}${goto 275}${top mem 5}
${hr}
${font Inter:bold:size=11}${color1}Top Processes — RAM${font} ${color2}${hr 2}
${color2}Name${goto 165}PID${goto 225}CPU%${goto 275}MEM%
${color}${top_mem name 1}${goto 165}${top_mem pid 1}${goto 225}${top_mem cpu 1}${goto 275}${top_mem mem 1}
${color}${top_mem name 2}${goto 165}${top_mem pid 2}${goto 225}${top_mem cpu 2}${goto 275}${top_mem mem 2}
${color}${top_mem name 3}${goto 165}${top_mem pid 3}${goto 225}${top_mem cpu 3}${goto 275}${top_mem mem 3}
]]
