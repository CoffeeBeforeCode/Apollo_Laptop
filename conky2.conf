-- Conky Column 2 - Disk, Network, Battery, Now Playing
conky.config = {
    alignment = 'top_right',
    background = true,
    border_width = 1,
    cpu_avg_samples = 2,
    default_color = 'FFFFFF',
    default_outline_color = 'FFFFFF',
    default_shade_color = '1A1A1A',
    double_buffer = true,
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    extra_newline = false,
    font = 'Inter:size=11',
    gap_x = 360,
    gap_y = 40,
    minimum_height = 5,
    minimum_width = 320,
    maximum_width = 320,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_ncurses = false,
    out_to_stderr = false,
    out_to_wayland = false,
    out_to_x = true,
    own_window = true,
    own_window_class = 'Conky',
    own_window_type = 'override',
    own_window_hints = 'undecorated,sticky,below,skip_taskbar,skip_pager',
    own_window_argb_visual = true,
    own_window_argb_value = 0,
    pad_percents = 1,
    show_graph_range = false,
    show_graph_scale = false,
    stippled_borders = 0,
    update_interval = 1.0,
    uppercase = false,
    use_spacer = 'none',
    use_xft = true,
    color1 = 'E07B20',
    color2 = '6B6560',
    color3 = '00C805',
    color4 = 'C0392B',
}
conky.text = [[
${font Inter:bold:size=11}${color1}${execi 3600 lsblk -d -n -o model | grep -v '^$' | head -1 | xargs}${font} ${color2}${hr 2}
${color2}Used:${color} ${fs_used /}${goto 180}${color2}Free:${goto 220}${color}${fs_free /}
${color3}${fs_bar /}
${color2}Read:   ${color3}${diskiograph_read 20,270 00C805 00C805 750}
${color2}Write:  ${color4}${diskiograph_write 20,270 E07B20 C0392B 750}
${color2}Disk I/O:${color}${alignr}$diskio
${hr}
${font Inter:bold:size=11}${color1}Network${font} ${color2}${hr 2}
${color2}Network:${color}${alignr}${wireless_essid wlp3s0}
${color2}Signal:${color}${alignr}${wireless_link_qual_perc wlp3s0}%
${color2}IP Address:${color}${alignr}${addr wlp3s0}
${color2}Download:${color}${alignr}${downspeed wlp3s0}
${color3}${downspeedgraph wlp3s0 30,320 00C805 00C805 -t}
${color2}Upload:${color}${alignr}${upspeed wlp3s0}
${color4}${upspeedgraph wlp3s0 30,320 C0392B C0392B -t}
${color2}Total Down:${color}${alignr}${totaldown wlp3s0}
${color2}Total Up:${color}${alignr}${totalup wlp3s0}
${hr}
${font Inter:bold:size=11}${color1}Battery${font} ${color2}${hr 2}
${color2}Level:${color}${alignr}${battery_percent BAT0}%
${color3}${battery_bar 8 BAT0}
${color2}Status:${color}${alignr}${battery BAT0}
${hr}
${font Inter:bold:size=11}${color1}Now Playing${font} ${color2}${hr 2}
${color1}${alignc}${exec playerctl metadata --format '{{artist}}' 2>/dev/null || echo ''}
${color2}${alignc}${exec playerctl metadata --format '{{title}}' 2>/dev/null || echo 'Nothing playing'}
${color2}${hr 1}${color}
${color1}${font Inter:bold:size=11}WEATHER — BASINGSTOKE${font}${color}
${color2}${hr 1}${color}
${color3}${execi 900 ~/.conky/weather.sh}${color}
]]
